<!DOCTYPE html>
<html>
<body>

<h2>Score: {{ score }}</h2>

<h3>{{ question.sentence }}</h3>

<form method="post" action="/play-v2">
    <input type="hidden" name="question_id" value="{{ question.id }}">

    {% for key, value in options %}
        <div style="margin:10px 0;">
            <button type="submit" name="selected_option" value="{{ value }}">
                {{ key }} - {{ value }}
            </button>
        </div>
    {% endfor %}
</form>

{% if result %}
    <p><strong>{{ result }}</strong></p>
{% endif %}

<br>
<a href="/reset">Reset Score</a>

</body>
</html>
