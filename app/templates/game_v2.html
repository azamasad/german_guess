<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    font-family: system-ui;
    background: #f5f7fa;
    margin: 0;
    padding: 16px;
}

.container {
    max-width: 520px;
    margin: auto;
}

.pill {
    display: inline-block;
    padding: 8px 14px;
    margin: 4px;
    border-radius: 20px;
    background: #ddd;
    cursor: pointer;
}

.pill.active {
    background: green;
    color: white;
}

.card {
    background: white;
    padding: 20px;
    border-radius: 16px;
    margin-top: 16px;
}

.option {
    border: 2px solid #ddd;
    padding: 14px;
    border-radius: 12px;
    margin-top: 10px;
    cursor: pointer;
}

.option:hover {
    background: #f0f0f0;
}

.feedback {
    margin-top: 16px;
    padding: 12px;
    border-radius: 10px;
}

.correct { background: #e6f6ee; color: green; }
.wrong { background: #fdecec; color: red; }

.btn {
    margin-top: 16px;
    padding: 14px;
    background: #24335c;
    color: white;
    text-align: center;
    border-radius: 10px;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="container">

<h2>LinguaQuiz</h2>

<!-- CEFR -->
<div>
    <div class="pill" onclick="toggleLevel('A1')">A1</div>
    <div class="pill" onclick="toggleLevel('A2')">A2</div>
    <div class="pill" onclick="toggleLevel('B1')">B1</div>
    <div class="pill" onclick="toggleLevel('B2')">B2</div>
    <div class="pill" onclick="toggleLevel('C1')">C1</div>
    <div class="pill" onclick="toggleLevel('C2')">C2</div>
</div>

<!-- Difficulty -->
<div>
    <div class="pill" onclick="applyDifficulty('beginner')">Beginner</div>
    <div class="pill" onclick="applyDifficulty('intermediate')">Intermediate</div>
    <div class="pill" onclick="applyDifficulty('advanced')">Advanced</div>
</div>

<div class="card">

<h3>{{ question.sentence }}</h3>

<form method="post" action="/play-v2" id="form">
    <input type="hidden" name="question_id" value="{{ question.id }}">
    <input type="hidden" name="selected_option" id="selected">
    <input type="hidden" name="levels" id="levelsInput" value="{{ levels }}">
</form>

{% for key, value in options %}
<div class="option" onclick="selectOption('{{ value }}')">
    <b>{{ key }}</b> {{ value }}
</div>
{% endfor %}

{% if result %}
<div class="feedback {% if result.correct %}correct{% else %}wrong{% endif %}">
    {{ result.explanation }}
</div>

<div class="btn" onclick="next()">Next →</div>
{% endif %}

</div>

</div>

<script>
let selectedLevels = "{{ levels }}".split(',').filter(Boolean);

function toggleLevel(level) {
    if (selectedLevels.includes(level)) {
        selectedLevels = selectedLevels.filter(l => l !== level);
    } else {
        selectedLevels.push(level);
    }
    update();
}

function applyDifficulty(type) {
    if (type === 'beginner') selectedLevels = ['A1','A2'];
    if (type === 'intermediate') selectedLevels = ['B1','B2'];
    if (type === 'advanced') selectedLevels = ['C1','C2'];
    update();
}

function update() {
    document.getElementById("levelsInput").value = selectedLevels.join(",");
    window.location.href = "/play-v2?levels=" + selectedLevels.join(",");
}

function selectOption(val) {
    document.getElementById("selected").value = val;
    document.getElementById("form").submit();
}

function next() {
    window.location.href = "/play-v2?levels=" + selectedLevels.join(",");
}
</script>

</body>
</html>
