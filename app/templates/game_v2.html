<h1>{{ question.sentence }}</h1>

<form method="post" action="/play-v2">
    <input type="hidden" name="question_id" value="{{ question.id }}">

    {% for key, value in options %}
        <button type="submit" name="selected_option" value="{{ value }}">
            {{ key }} - {{ value }}
        </button>
    {% endfor %}
</form>

{% if result %}
    <p>{{ result }}</p>
{% endif %}
